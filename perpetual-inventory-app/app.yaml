command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"
env:
  - name: SERVING_ENDPOINT
    value: "${SERVING_ENDPOINT}"
  - name: PI_CATALOG
    value: "${PI_CATALOG}"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "${DATABRICKS_WAREHOUSE_ID}"
  - name: GENIE_SPACE_ID
    value: "${GENIE_SPACE_ID}"
